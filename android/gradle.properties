org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Pin Gradle to the Android Studio JBR (JDK 21) so the IDE and direct `gradlew`
# invocations match what `flutter run` uses. Without this, the system JDK 25
# trips a bug in Gradle 8.14's embedded Kotlin compiler that can't parse the
# "25.0.2" version string.
org.gradle.java.home=C:/Program Files/Android/Android Studio/jbr
